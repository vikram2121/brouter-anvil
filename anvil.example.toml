[node]
name = "my-anvil"
data_dir = "/var/lib/anvil"
listen = "0.0.0.0:8333"          # mesh peers (WebSocket)
api_listen = "0.0.0.0:9333"      # REST API

[identity]
wif = "Kx..."                     # BRC-42 identity root

[peers]
seeds = [
  # "ws://peer1.example.com:8333",
]

[bsv]
nodes = ["seed.bitcoinsv.io:8333"]

[arc]
enabled = false
url = "https://arc.taal.com"
# api_key = ""

[junglebus]
enabled = false
url = "junglebus.gorillapool.io"
# subscriptions = [
#   { id = "sub_abc123", name = "ship-tokens", from_block = 800000 },
# ]

[overlay]
enabled = true
topics = ["forge:mainnet"]

[envelopes]
max_ephemeral_ttl = 3600
max_durable_size = 65536
max_durable_store_mb = 10240
warn_at_percent = 80

[api]
auth_token = ""
tls_cert = ""
tls_key = ""
rate_limit = 100
