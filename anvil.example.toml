[node]
name = "my-anvil"
data_dir = "/var/lib/anvil"
listen = "0.0.0.0:8333"          # mesh peers — wss:// when TLS configured, ws:// otherwise
api_listen = "0.0.0.0:9333"      # REST API — HTTPS when TLS configured

[identity]
wif = "Kx..."                     # BRC-42 identity root — required for mesh peering and wallet

[foundry]
seeds = [
  # "wss://peer1.example.com:8333",   # production: always use wss://
  # "ws://localhost:8333",             # dev only: plain ws
]

[bsv]
nodes = ["seed.bitcoinsv.io:8333"]

[arc]
enabled = false
url = "https://arc.taal.com"
# api_key = ""

[junglebus]
enabled = false
url = "junglebus.gorillapool.io"
# subscriptions = [
#   { id = "sub_abc123", name = "ship-tokens", from_block = 800000 },
# ]

[overlay]
enabled = true
topics = ["foundry:mainnet"]

[envelopes]
max_ephemeral_ttl = 3600
max_durable_size = 65536
max_durable_store_mb = 10240
warn_at_percent = 80

# Security + API auth + x402 payment gating
[api]
auth_token = ""                   # bearer token for write endpoints — set to enable writes
tls_cert = ""                     # path to TLS cert — enables HTTPS for API + wss:// for mesh
tls_key = ""                      # path to TLS key — required with tls_cert
rate_limit = 100                  # requests/second per IP for open read endpoints (0 = disabled)
trust_proxy = false               # if true, trust X-Forwarded-For for client IP (set true behind nginx/caddy)
payment_satoshis = 0              # per-request price for open read endpoints via x402 HTTP 402 (0 = free)
