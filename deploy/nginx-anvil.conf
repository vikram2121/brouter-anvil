# Anvil Foundry Mesh — nginx reverse proxy for TLS termination
# Install: sudo cp nginx-anvil.conf /etc/nginx/sites-available/anvil
#          sudo ln -s /etc/nginx/sites-available/anvil /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d anvil-a.example.com -d anvil-b.example.com
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace example.com with your actual domain. If no domain, use IP-based
# TLS with a self-signed cert (less ideal but still encrypts traffic).

# --- Node A: API (HTTPS) ---
server {
    listen 443 ssl;
    server_name anvil-a.example.com;

    # Let's Encrypt certs (certbot auto-manages these)
    ssl_certificate /etc/letsencrypt/live/anvil-a.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anvil-a.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9333;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Node A: Mesh (WSS) ---
server {
    listen 8443 ssl;
    server_name anvil-a.example.com;

    ssl_certificate /etc/letsencrypt/live/anvil-a.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anvil-a.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# --- Node B: API (HTTPS) ---
server {
    listen 9443 ssl;
    server_name anvil-b.example.com;

    ssl_certificate /etc/letsencrypt/live/anvil-b.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anvil-b.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9334;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Node B: Mesh (WSS) ---
server {
    listen 8444 ssl;
    server_name anvil-b.example.com;

    ssl_certificate /etc/letsencrypt/live/anvil-b.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anvil-b.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8334;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
