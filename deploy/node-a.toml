# Anvil Prime — seed node
# Identity: set ANVIL_IDENTITY_WIF env var (unique per node)

[node]
name = "anvil-prime"
data_dir = "/var/lib/anvil-a"
listen = "0.0.0.0:8333"          # mesh peers (wss:// with TLS)
api_listen = "0.0.0.0:9333"      # REST API

[identity]
# wif = ""  # ANVIL_IDENTITY_WIF env var

[mesh]
# Node A is a seed — it doesn't need seed peers itself.
# Node B will connect to A.
seeds = []

[bsv]
nodes = ["seed.bitcoinsv.io:8333"]

[arc]
enabled = true
url = "https://arc.gorillapool.io"

[junglebus]
enabled = true
url = "junglebus.gorillapool.io"

[overlay]
enabled = true
topics = ["anvil:mainnet"]

[envelopes]
max_ephemeral_ttl = 3600
max_durable_size = 65536
max_durable_store_mb = 10240
warn_at_percent = 80

[api]
rate_limit = 100
trust_proxy = false
payment_satoshis = 10             # node charges 10 sats/request

[api.app_payments]
allow_passthrough = true          # apps can be sole payee (Model 2)
allow_split = true                # atomic dual-pay: node + app (Model 3)
allow_token_gating = true         # apps can gate via credentials (Model 4)
max_app_price_sats = 10000        # cap on app-declared prices
